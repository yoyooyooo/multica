name: ${COMPOSE_PROJECT_NAME:-multica}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-multica}"
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    labels:
      multica.owner: "${MULTICA_OWNER:-deployment}"
      multica.worktree.path: "${WORKTREE_PATH:-}"
      multica.worktree.project: "${COMPOSE_PROJECT_NAME:-}"

volumes:
  pgdata:
    labels:
      multica.owner: "${MULTICA_OWNER:-deployment}"
      multica.worktree.path: "${WORKTREE_PATH:-}"
      multica.worktree.project: "${COMPOSE_PROJECT_NAME:-multica}"
